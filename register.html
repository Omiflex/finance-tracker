<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Student Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 5vh;">
        <div class="card">
            <div class="card-header" style="text-align: center;">
                <div class="badge">Get Started 🚀</div>
                <h2 style="margin-top: 1rem;">Create Account</h2>
                <p class="card-description">Join thousands of students managing money smarter</p>
            </div>
            <div class="card-body">
                <form id="register-form">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" placeholder="student@university.edu" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Create Password</label>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label style="display: flex; align-items: flex-start; gap: 0.5rem; font-weight: normal; font-size: 0.875rem;">
                            <input type="checkbox" required style="margin-top: 0.25rem;"> 
                            I agree to the Terms of Service and Privacy Policy
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        Create My Account
                    </button>
                </form>
                
                <div style="text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #E5E7EB;">
                    <p style="font-size: 0.875rem;">Already have an account? 
                        <a href="login.html" style="color: #2563EB; font-weight: 600; text-decoration: none;">Login</a>
                    </p>
                </div>
            </div>
        </div>
        <div style="text-align: center;">
            <a href="index.html" class="btn btn-outline btn-sm">← Back to Home</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
