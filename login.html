<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="max-width: 450px; margin-top: 5vh;">
        <div class="card">
            <div class="card-header" style="text-align: center;">
                <div class="badge">Welcome Back 👋</div>
                <h2 style="margin-top: 1rem;">Login</h2>
                <p class="card-description">Access your finance dashboard</p>
            </div>
            <div class="card-body">
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">University Email</label>
                        <input type="email" id="email" placeholder="student@university.edu" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <!-- Removed the inline style attribute here -->
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; margin-bottom: 0;">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" style="font-size: 0.875rem; color: #2563EB; text-decoration: none;">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        Login to Dashboard
                    </button>
                </form>
                
                <div style="text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #E5E7EB;">
                    <p style="font-size: 0.875rem;">Don't have an account? 
                        <a href="register.html" style="color: #9333EA; font-weight: 600; text-decoration: none;">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
        <div style="text-align: center;">
            <a href="index.html" class="btn btn-outline btn-sm">← Back to Home</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
